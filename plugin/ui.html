<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 11px;
      background: #2c2c2c;
      color: #fff;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      gap: 4px;
    }
    .row { display: flex; align-items: center; gap: 6px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #666;
    }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.connected { background: #22c55e; }
    .dot.error { background: #ef4444; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .title { font-weight: 600; font-size: 12px; }
    #status { color: #aaa; }
    .hint { font-size: 9px; color: #666; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="title">FigCli v2</div>
  <div class="row">
    <div id="dot" class="dot connecting"></div>
    <span id="status">Connecting...</span>
  </div>
  <div class="hint">Keep this window open</div>

  <script>
    const PORTS = [3456, 3457, 3458, 3459, 3460];
    let currentPortIndex = 0;
    let ws = null;
    let reconnectTimer = null;
    const statusEl = document.getElementById('status');
    const dotEl = document.getElementById('dot');

    function setStatus(text, state) {
      statusEl.textContent = text;
      dotEl.className = 'dot ' + state;
    }

    function connect() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      const port = PORTS[currentPortIndex];
      const url = `ws://127.0.0.1:${port}/plugin`;

      try {
        ws = new WebSocket(url);

        ws.onopen = () => {
          setStatus('Connected', 'connected');
          currentPortIndex = 0;
          parent.postMessage({ pluginMessage: { type: 'connected' } }, '*');
          ws.send(JSON.stringify({ type: 'hello', mode: 'plugin', version: '2.0.0' }));
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);

            // Ping/pong heartbeat
            if (msg.action === 'ping') {
              ws.send(JSON.stringify({ type: 'pong', id: msg.id }));
              return;
            }

            // Forward all other messages to plugin
            parent.postMessage({ pluginMessage: msg }, '*');
          } catch (e) {
            console.error('Message parse error:', e);
          }
        };

        ws.onclose = () => {
          setStatus('Reconnecting...', 'connecting');
          parent.postMessage({ pluginMessage: { type: 'disconnected' } }, '*');
          currentPortIndex = 0;
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 2000);
        };

        ws.onerror = () => {
          setStatus('Scanning...', 'connecting');
          currentPortIndex = (currentPortIndex + 1) % PORTS.length;
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connect, 500);
        };

      } catch (e) {
        setStatus('Error', 'error');
        parent.postMessage({ pluginMessage: { type: 'error', message: e.message } }, '*');
        currentPortIndex = (currentPortIndex + 1) % PORTS.length;
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 500);
      }
    }

    // Receive results from plugin main thread → send to daemon
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'result') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'result',
            id: msg.id,
            result: msg.result,
            error: msg.error,
          }));
        }
      }
    };

    connect();
  </script>
</body>
</html>
